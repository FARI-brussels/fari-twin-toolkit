[project]
name = "fari-twin-types"
version = "0.1.0"
description = "Pydantic models for the FARI Twin Toolkit wire format, generated from specs/openapi.yaml."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["fari_twin_types"]

[dependency-groups]
dev = ["datamodel-code-generator>=0.26", "pytest>=8"]
